name: Deploy Next.js to GitHub Pages

on:
  push:
    branches: ["main"]
  schedule:
    - cron: "7,17,27,37,47,57 * * * *"
  workflow_dispatch:
    inputs:
      reset_championship_cache:
        description: "Reset championship cache before rebuilding the feed"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Reset championship cache if requested
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.reset_championship_cache }}
        run: |
          rm -f .github/data/mining-championship-cache.json
          mkdir -p .github/data
          cat > .github/data/mining-championship-cache.json <<'JSON'
          {
            "version": 1,
            "lastScannedBlock": 999999,
            "participants": {}
          }
          JSON

      - name: Build championship feed
        env:
          CHAMPIONSHIP_RPC_URL: ${{ vars.CHAMPIONSHIP_RPC_URL || 'https://rpc.inri.life' }}
          CHAMPIONSHIP_POOLS_API_URL: ${{ vars.CHAMPIONSHIP_POOLS_API_URL || 'https://poolapi.inri.life/api/pools' }}
          CHAMPIONSHIP_POOL_ID: ${{ vars.CHAMPIONSHIP_POOL_ID || 'inri-solo' }}
          CHAMPIONSHIP_POOL_PAYOUT_ADDRESS: ${{ vars.CHAMPIONSHIP_POOL_PAYOUT_ADDRESS || '0xc6c235Ee82003396C2E051E11aAb3726CA84881E' }}
          CHAMPIONSHIP_START_BLOCK: ${{ vars.CHAMPIONSHIP_START_BLOCK || '1000000' }}
          CHAMPIONSHIP_END_BLOCK: ${{ vars.CHAMPIONSHIP_END_BLOCK || '1500000' }}
          CHAMPIONSHIP_BASE_REWARD_PER_BLOCK: ${{ vars.CHAMPIONSHIP_BASE_REWARD_PER_BLOCK || '0.2' }}
          CHAMPIONSHIP_MAX_BLOCKS_PER_RUN: ${{ vars.CHAMPIONSHIP_MAX_BLOCKS_PER_RUN || '5000' }}
          CHAMPIONSHIP_POOL_PAGES_PER_RUN: ${{ vars.CHAMPIONSHIP_POOL_PAGES_PER_RUN || '100' }}
          CHAMPIONSHIP_POOL_PAGE_SIZE: ${{ vars.CHAMPIONSHIP_POOL_PAGE_SIZE || '100' }}
          CHAMPIONSHIP_REQUEST_DELAY_MS: ${{ vars.CHAMPIONSHIP_REQUEST_DELAY_MS || '0' }}
          CHAMPIONSHIP_DEBUG: ${{ vars.CHAMPIONSHIP_DEBUG || 'false' }}
        run: node scripts/build-championship.mjs

      - name: Commit updated championship feed/cache
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/mining-championship.json .github/data/mining-championship-cache.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: update championship feed" || exit 0

          pushed=0
          for i in 1 2 3; do
            git fetch origin main
            git rebase origin/main || { git rebase --abort || true; sleep 5; continue; }

            if git push origin HEAD:main; then
              pushed=1
              break
            fi

            sleep 5
          done

          if [ "$pushed" -ne 1 ]; then
            echo "Warning: could not push championship cache/feed back to repo after retries. Continuing deploy."
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build
        env:
          CUSTOM_DOMAIN: platform.inri.life
        run: pnpm build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
